<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备忘录Auto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>备忘录Auto</h2>
            </div>
            <nav class="sidebar-nav">
                <button id="nav-notes" class="active">📝 便笺</button>
                <button id="nav-accounts">🔑 账号管理</button>
                <div class="projects-section">
                    <h3>📊 项目管理</h3>
                    <ul id="project-list"></ul>
                    <button id="btn-add-project">+ 新建项目</button>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <!-- 便笺视图 -->
            <section id="note-view" class="view">
                <div class="view-header">
                    <h1>便笺</h1>
                </div>
                <div class="note-input">
                    <textarea id="note-textarea" placeholder="记点什么..."></textarea>
                    <button id="btn-save-note">保存便笺</button>
                </div>
                <div id="note-list" class="note-list"></div>
            </section>

            <!-- 账号管理视图 -->
            <section id="account-view" class="view" style="display: none;">
                <div class="view-header">
                    <h1>账号管理</h1>
                    <button id="btn-open-add-account" class="btn-primary">+ 添加账号</button>
                </div>
                <div id="account-list" class="account-list"></div>
            </section>

            <!-- 项目视图 (看板) -->
            <section id="project-view" class="view" style="display: none;">
                <div class="view-header">
                    <h1 id="current-project-name">项目名称</h1>
                </div>
                <div id="kanban-board" class="kanban-board"></div>
            </section>
        </main>
    </div>

    <!-- 弹窗: 新建项目 -->
    <div id="modal-project" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>新建项目</h3>
            <input type="text" id="input-project-name" placeholder="项目名称">
            <div class="modal-actions">
                <button onclick="closeModal('modal-project')">取消</button>
                <button id="btn-modal-confirm-project" class="btn-primary">创建</button>
            </div>
        </div>
    </div>

    <!-- 弹窗: 添加/编辑账号 -->
    <div id="modal-account" class="modal" style="display: none;">
        <div class="modal-content">
            <h3 id="account-modal-title">添加账号</h3>
            <input type="hidden" id="edit-account-id">
            <div class="form-group">
                <label>平台</label>
                <select id="acc-platform">
                    <option value="Google">Google</option>
                    <option value="GitHub">GitHub</option>
                    <option value="Vultr">Vultr</option>
                    <option value="Custom">自定义</option>
                </select>
            </div>
            <div class="form-group">
                <label>用户名/邮箱</label>
                <input type="text" id="acc-username" placeholder="UID">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="acc-password" placeholder="PWD">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="acc-note" placeholder="备注信息"></textarea>
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('modal-account')">取消</button>
                <button id="btn-save-account" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
