name: "Auto-Version & Publish"

on:
  push:
    branches:
      - main

jobs:
  # 独立版本自增任务，避免多平台并发时的竞态冲突
  bump-version:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Auto Version Bump
        id: bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 检查提交信息是否包含 [skip ci]，避免循环（虽然我们自己也会加）
          if [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]]; then
            echo "Skipping version bump as this is a CI commit"
            exit 0
          fi

          # 增加版本号
          npm version patch --no-git-tag-version
          
          # 同步版本号到 tauri.conf.json
          VERSION=$(node -e "console.log(require('./package.json').version)")
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); c.version='$VERSION'; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2));"
          
          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push origin main
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get current version
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish:
    needs: bump-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin" # 构建通用二进制文件（支持 Intel 和 Apple Silicon）
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # 确保拉取到 bump-version 任务提交的最新的代码
          ref: main
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 如果是 macOS，需要添加双架构支持
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名所需环境变量（需在仓库 Secrets 中设置）
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ needs.bump-version.outputs.new_version }}
          releaseName: "Release v${{ needs.bump-version.outputs.new_version }}"
          releaseBody: "自动生成的版本发布。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
