<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备忘录Auto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>备忘录Auto</h2>
            </div>
            <nav class="sidebar-nav">
                <button id="nav-inbox" class="active">📥 收集箱 (Inbox)</button>
                <button id="nav-tasks">📋 任务流 (Tasks)</button>
                <button id="nav-timeline">🕒 活动流 (Timeline)</button>
                <button id="nav-accounts">🔑 账号管理 (Accounts)</button>
                
                <div class="projects-section">
                    <h3>项目标记 (Projects)</h3>
                    <ul id="project-tags-list">
                        <!-- 动态生成的项目标签 -->
                    </ul>
                </div>
            </nav>
        </aside>
        
        <main class="main-content">
            <!-- 1. Inbox View -->
            <section id="inbox-view" class="view">
                <div class="view-header">
                    <h1>📥 收集箱</h1>
                </div>
                <div class="quick-input-area">
                    <textarea id="inbox-textarea" placeholder="输入灵感或待办，按 Enter 保存..."></textarea>
                    <div class="input-ops">
                        <select id="inbox-project-select">
                            <option value="">无项目标记</option>
                        </select>
                        <button id="btn-save-inbox" class="btn-primary">收集</button>
                    </div>
                </div>
                <div id="inbox-list" class="task-grid"></div>
            </section>

            <!-- 2. Tasks View (Kanban) -->
            <section id="tasks-view" class="view" style="display: none;">
                <div class="view-header">
                    <h1>📋 任务看板</h1>
                    <div class="view-filter">
                        <span id="current-project-filter">所有项目</span>
                    </div>
                </div>
                <div class="kanban-container">
                    <div class="kanban-col" data-status="todo">
                        <h3>待办 (Todo)</h3>
                        <div class="task-list" id="col-todo"></div>
                    </div>
                    <div class="kanban-col" data-status="doing">
                        <h3>执行中 (Doing)</h3>
                        <div class="task-list" id="col-doing"></div>
                    </div>
                    <div class="kanban-col" data-status="done">
                        <h3>已完成 (Done)</h3>
                        <div class="task-list" id="col-done"></div>
                    </div>
                </div>
            </section>

            <!-- 3. Timeline View -->
            <section id="timeline-view" class="view" style="display: none;">
                <div class="view-header">
                    <h1>🕒 活动流</h1>
                </div>
                <div id="timeline-list" class="timeline-container"></div>
            </section>

            <!-- 4. Accounts View -->
            <section id="account-view" class="view" style="display: none;">
                <div class="view-header">
                    <h1>🔑 账号管理</h1>
                    <button id="btn-open-add-account" class="btn-primary">+ 添加账号</button>
                </div>
                <div id="account-list" class="account-list"></div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-account" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>添加账号</h3>
            <div class="form-group">
                <label>平台</label>
                <input type="text" id="acc-platform" placeholder="如: GitHub, Vultr">
            </div>
            <div class="form-group">
                <label>用户名/邮箱</label>
                <input type="text" id="acc-username">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="acc-password">
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('modal-account')">取消</button>
                <button id="btn-save-account" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
